[global]
	#Global switch for all Create Structures Arise structures. Set to false to prevent every structure from generating. Live reload affects newly generated chunks only.
	enabled = true
	#Global spawn density multiplier. 1.0 keeps original spacing, values above 1.0 spawn more often, values below 1.0 spawn less often, and 0 blocks generation. Live reload affects newly generated chunks only.
	# Default: 1.0
	# Range: 0.0 ~ 1000.0
	spawn_multiplier = 1.0

[spawn_rates]
	#Additional global multiplier for all Create Structures Arise structure spawn rates. 1.0 preserves current behavior, lower values make structures less frequent, and 0 blocks generation. Live reload affects newly generated chunks only.
	# Default: 1.0
	# Range: 0.0 ~ 1000.0
	global_structure_multiplier = 1.0

[debug]
	#When true, logs whenever a Create Structures Arise structure is blocked by this config.
	log_blocked = false
	#When true, logs whenever a Create Structures Arise structure is allowed by this config.
	log_allowed = false

	[compatibility.brass_age]
		#When true and Brass Age is loaded, Brass Age machine blocks and block entities in Create Structures Arise structures are replaced during placement.
		remove_brass_age_machines = false
		#When true and Brass Age is loaded, decorative Brass Age blocks in Create Structures Arise structures are replaced during placement.
		remove_brass_age_decorations = false
		#When true, missing or disabled Brass Age blocks are replaced with replacement_block instead of being kept when possible.
		replace_missing_brass_age_blocks = true
		#Block ID used when Brass Age components are removed from structures.
		replacement_block = "minecraft:air"

	[compatibility.worldgen]
		#When true, airborne structures avoid known mountain, hill, peak, cliff, skyland, and extreme-terrain biome tags. Live reload affects newly generated chunks only.
		avoid_mountain_biomes_for_airborne_structures = true
		#When true, airborne structures sample nearby terrain and refuse generation when the area is too steep. Live reload affects newly generated chunks only.
		avoid_steep_terrain = true
		#Maximum allowed difference between sampled minimum and maximum terrain height for airborne structures. Live reload affects newly generated chunks only.
		# Default: 18
		# Range: 1 ~ 512
		max_allowed_height_difference = 18
		#Block radius used for airborne steep-terrain sampling. North, south, east, west, and corner points are checked. Live reload affects newly generated chunks only.
		# Default: 32
		# Range: 1 ~ 512
		check_radius = 32
		#When true, airborne structures avoid Tectonic mountain/extreme-terrain compatibility biome tags when present. Live reload affects newly generated chunks only.
		blacklist_tectonic_mountain_biomes = true
		#When true, airborne structures avoid Terralith mountain, cliff, peak, skyland, and extreme-terrain compatibility biome tags when present. Live reload affects newly generated chunks only.
		blacklist_terralith_mountain_biomes = true
		#When true, airborne structures avoid Biomes O' Plenty mountain, highland, cliff, and crag compatibility biome tags when present. Live reload affects newly generated chunks only.
		blacklist_biomes_o_plenty_mountain_biomes = true

	[structures.chocolate_pit]
		#Enables this structure. Set to false to prevent this structure from generating. Live reload affects newly generated chunks only.
		enabled = true
		#Generation weight for this structure. Cannot be negative. Set to 0 to prevent this structure from generating. Values above 1 make this structure more common. Live reload affects newly generated chunks only.
		# Default: 1
		# Range: > 0
		weight = 1
		#Average chunk spacing for this structure before the global spawn multiplier is applied. Must be greater than separation. Live reload affects newly generated chunks only; existing chunks require world/chunk regeneration.
		# Default: 130
		# Range: > 1
		spacing = 130
		#Minimum chunk separation for this structure. Must be lower than spacing. Live reload affects newly generated chunks only; existing chunks require world/chunk regeneration.
		# Default: 10
		# Range: > 0
		separation = 10
		#Dimension IDs where this structure may generate. Empty list means all dimensions are allowed unless blacklisted. Live reload affects newly generated chunks only.
		dimension_whitelist = []
		#Dimension IDs where this structure must not generate. Entries here override the whitelist. Live reload affects newly generated chunks only.
		dimension_blacklist = []
		#Biome IDs or biome tags where this structure may generate. Use '#namespace:tag' for tags. Empty list means all original datapack biomes are allowed unless blacklisted. Live reload affects newly generated chunks only.
		biome_whitelist = []
		#Biome IDs or biome tags where this structure must not generate. Use '#namespace:tag' for tags. Entries here override the whitelist. Live reload affects newly generated chunks only.
